<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People Detection v0</title>
    <link rel="stylesheet" href="style_people_detection.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="canvas-column">
        <h1 class="counter-title">
          People in Frame: <span id="people-count">0</span>
        </h1>
        <div id="sketch-holder" class="sketch-holder"></div>
      </section>

      <aside class="control-panel" aria-label="Controls">
        <h2>Control Panel</h2>
        <p id="status-text">Loading model and camera...</p>
        <div id="controls-host" class="controls-host"></div>
      </aside>
    </main>

    <script src="detector_basic.js"></script>
  </body>
</html>
